# Build Tailwind CSS and deploy the portfolio to GitHub Pages
name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build Tailwind CSS
        run: npm run build:css

      # Publish only the static site (no node_modules, source, or tooling).
      # The résumé PDF is built locally from LaTeX and committed in assets/.
      - name: Assemble static site
        run: |
          mkdir -p _site
          cp index.html _site/
          cp -r dist js assets _site/
          # Redirect for the old project-site path (pre-rename links in the wild)
          mkdir -p _site/Online-Portfolio
          cat > _site/Online-Portfolio/index.html <<'HTML'
          <!DOCTYPE html><html><head><meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=https://aftabmulani11.github.io/">
          <link rel="canonical" href="https://aftabmulani11.github.io/">
          <title>Moved</title></head>
          <body>This page has moved to <a href="https://aftabmulani11.github.io/">aftabmulani11.github.io</a>.</body></html>
          HTML

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site"

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
